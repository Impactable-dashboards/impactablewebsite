name: SEO / AEO gate
on:
  push:
    paths: ['**.html', 'scripts/check-seo.py', 'sitemap.xml', 'robots.txt', 'llms.txt']
  pull_request:
    paths: ['**.html', 'scripts/check-seo.py']
jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Run SEO/AEO gate
        run: python3 scripts/check-seo.py
